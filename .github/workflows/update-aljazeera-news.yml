name: Update Al Jazeera Palestine News

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update news.json from Al Jazeera RSS
        run: node scripts/update-aljazeera-news.js

      - name: Commit and push when changed
        run: |
          if git diff --quiet news.json; then
            echo "No changes in news.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          git commit -m "Update Al Jazeera Palestine news"
          git push
