 <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FREE PALESTINE ($ZTN) | Zeitoun</title>
    <meta
      name="description"
      content="FREE PALESTINE ($ZTN) official website."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Naskh+Arabic:wght@500;700&family=Teko:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background" aria-hidden="true"></div>
    <div class="leaf-layer" aria-hidden="true"></div>
    <div class="content">

      <header class="site-header container" id="home">
        <a class="brand" href="#home" aria-label="FREE PALESTINE $ZTN home">
          <span class="coin-3d" aria-hidden="true">
            <img class="coin-face front" src="coin.png" alt="" />
            <img class="coin-face back" src="coin.png" alt="" />
          </span>
          <span class="sr-only">FREE PALESTINE $ZTN coin logo</span>
        </a>
      </header>

      <div class="ca-strip container">
        <button id="copy-ca" class="btn ca-btn" type="button" data-ca="TBA" data-i18n="copyCA">
          Copy CA Address
        </button>
        <span id="copy-status" role="status" aria-live="polite"></span>
      </div>

      <main>
      <section id="roadmap" class="section container">
        <h2 data-i18n="roadmapTitle">Roadmap</h2>

        <article class="chart-frame roadmap-visual" aria-label="Roadmap visual diagram">
          <img src="b.png" alt="Roadmap visual diagram" loading="lazy" />
          <p class="roadmap-caption">
            FREE PALESTINE（$ZTN）は公正な土壌（Justice）に根ざし、流動性報酬（Solidarity）はパレスチナへの寄付（Impact）へと結実します。
          </p>
        </article>

        <div class="timeline">
          <article class="time-card">
            <h2 data-i18n="phase1Title">Justice</h2>
            <h3 data-i18n="chartTitle">DEX Screener</h3>
            <div style="width:100%; height:500px; border-radius:12px; overflow:hidden;">
              <iframe
                src="https://dexscreener.com/solana/AGdGTQa8iRnSx4fQJehWo4Xwbh1bzTazs55R6Jwupump?embed=1&theme=dark"
                style="width:100%; height:100%; border:0;"
                loading="lazy"
                title="DEX Screener chart">
              </iframe>
            </div>
          </article>
          <article class="time-card">
            <h2 data-i18n="phase2Title">Solidarity</h2>
            <p data-i18n="phase2Body">“Be water, my friend.” - Bruce Lee</p>
            <section id="chat" class="section">
                <h3>Telegram Live</h3>
                <div id="chat-list" class="chat-box"></div>
            </section>
          </article>
          <article class="time-card">
            <h2 data-i18n="phase3Title">Impact</h2>
            <p data-i18n="phase3Body">“Let it be a tale.” - Refaat Alareer</p>
          </article>
        </div>

      </section>
      
      </main>

      <footer class="site-footer container">
        <p data-i18n="footer">© 2026 FREE PALESTINE ($ZTN) </p>
      </footer>

      <div class="floating-language" aria-label="Language switcher">
        <button id="language-toggle" type="button" class="lang-fab" aria-expanded="false">🌐</button>
        <div id="language-menu" class="lang-menu" hidden>
          <div class="lang-options" role="menu" aria-label="Language">
            <button class="lang-option" type="button" data-lang="en" role="menuitem">EN</button>
            <button class="lang-option" type="button" data-lang="fr" role="menuitem">FR</button>
            <button class="lang-option" type="button" data-lang="ar" role="menuitem">AR</button>
            <button class="lang-option" type="button" data-lang="ja" role="menuitem">JA</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
